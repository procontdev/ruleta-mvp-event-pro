services:
  db:
    image: mysql:8.0
    container_name: ruleta_mysql
    command: ["mysqld","--default-authentication-plugin=mysql_native_password","--character-set-server=utf8mb4","--collation-server=utf8mb4_unicode_ci"]
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_PASSWORD:-devpass}
      MYSQL_DATABASE: ${DB_NAME:-ruleta_dev}
      TZ: America/Lima
    healthcheck:
      test: ["CMD-SHELL","mysqladmin ping -h localhost -uroot -p${DB_PASSWORD:-devpass} --silent"]
      interval: 10s
      timeout: 5s
      retries: 10
    ports:
      - "3306:3306"
    volumes:
      - db_data:/var/lib/mysql
    networks:
      - ruleta_net

  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: ruleta_api
    environment:
      ASPNETCORE_URLS: http://0.0.0.0:8080
      ConnectionStrings__Default: "Server=db;Port=3306;Database=${DB_NAME:-ruleta_dev};User=root;Password=${DB_PASSWORD:-devpass};TreatTinyAsBoolean=true"
      Admin__DebugKey: "dev-123456"
      Cors__AllowedOrigins__0: "http://localhost:5173"
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "5001:8080"
    networks:
      - ruleta_net

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: ruleta_front
    environment:
      VITE_API_BASE_URL: "http://localhost:5001"
      VITE_ADMIN_KEY: "dev-123456"   # 👈 para llamadas admin desde el front (solo DEV)
      VITE_DEFAULT_EVENT_ID: "1"
      VITE_DASHBOARD_REFRESH_MS: "5000"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    command: ["npm","run","dev","--","--host","0.0.0.0"]
    ports:
      - "5173:5173"
    depends_on:
      - api
    networks:
      - ruleta_net

volumes:
  db_data:

networks:
  ruleta_net:
    driver: bridge
